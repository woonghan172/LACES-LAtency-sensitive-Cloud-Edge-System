#default config file
simulation_time=15
warm_up_period=1
file_log_enabled=true
deep_file_log_enabled=false


#logging is disabled if it is 0
vm_load_check_interval=0.1


#logging is disabled if it is 0
location_check_interval=0.1


#logging is disabled if it is 0
ap_delay_check_interval=0


min_number_of_mobile_devices=200
max_number_of_mobile_devices=1600
mobile_device_counter_size=200


# --- Latency Updates for US 2026 ---
# Median US WAN latency is ~13ms
wan_propagation_delay=0.013
# Modern Metro Fiber/MAN internal delay is ~1-3ms
lan_internal_delay=0.002


# --- Bandwidth Updates for Consistency ---
wlan_bandwidth=850000
wan_bandwidth=308000
gsm_bandwidth=100000


#all the host on cloud runs on a single datacenter
number_of_host_on_cloud_datacenter=1000
number_of_vm_on_cloud_host=80
core_for_cloud_vm=4
mips_for_cloud_vm=100000
ram_for_cloud_vm=32000
storage_for_cloud_vm=1000000


#mobile devices has no processing unit in this scenario
core_for_mobile_vm=8
mips_for_mobile_vm=20000
ram_for_mobile_vm=8000
storage_for_mobile_vm=128000


#use ',' for multiple values
# orchestrator_policies=NETWORK_BASED,UTILIZATION_BASED,RANDOM,LACES
# orchestrator_policies=NETWORK_BASED,UTILIZATION_BASED,LATENCY_SENSITIVE
orchestrator_policies=LACES_MAB


# LACES weighted-cost policy weights (latency, computation, data-transfer)
# score = w_latency*T_net + w_computation*T_processing + w_data*T_transmission
laces_weight_latency=0.5
laces_weight_computation=0.3
laces_weight_data=0.2


#use ',' for multiple values
simulation_scenarios=DEFAULT_SCENARIO


#mean waiting time in seconds
attractiveness_L1_mean_waiting_time=480
attractiveness_L2_mean_waiting_time=300
attractiveness_L3_mean_waiting_time=120
